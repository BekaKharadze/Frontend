<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Reports</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
    <nav class="navbar">

        <div class="container nav-inner">

            <div class="logo">Animal Rescue</div>

            <button class="menu-btn" id="menuBtn">☰</button>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="incidents.html">Incidents</a></li>
                <li><a href="partners.html">Partners</a></li>
                <li><a href="about.html">About</a></li>
            </ul>

        </div>

    </nav>
    </header>

    <main class="page">

        <div class="container">

            <div class="page-header">

                <h1>Animal Reports</h1>

                <p>
                    Search reported animals and save your favorites.
                </p>

            </div>

            <div class="favorites-bar">

                <p>
                    Saved Animals:
                    <span id="favoriteCount">0</span>
                </p>

            </div>

            <div class="filters">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search animal..."
                >

                <select id="statusFilter">

                    <option value="all">
                        All Statuses
                    </option>

                    <option value="injured">
                        Injured
                    </option>

                    <option value="lost">
                        Lost
                    </option>

                    <option value="rescued">
                        Rescued
                    </option>

                </select>

            </div>

            <div
                class="animals-grid"
                id="incidentContainer"
            >
            </div>

        </div>

    </main>

    <footer class="footer">
        <div class="container">
            <p>Animal Rescue Project © 2026</p>
        </div>
    </footer>

    <script src="js/incidents.js"></script>

</body>
</html>
